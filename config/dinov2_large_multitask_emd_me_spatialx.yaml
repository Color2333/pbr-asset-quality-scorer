# DINOv2: 强通道独立 + 只有metallic读其他通道的空间patch token(metallic-only spatial cross-channel)。
# 这是"早融合/跨通道"在DINOv2上的最强、最干净形式: base/normal/roughness各自独立编码(保持强项),
# metallic的patch token空间地cross-attend bc/nm/ro的patch token(比cc_metallic池化更细, 不付OOD税)。
# out_proj零初始化→从恒等起步。对照: baseline(metallic整体0.624/非黑0.686/近黑0.555),
# cc_metallic池化版(近黑0.570)。关键: 空间版近黑能否超0.570/0.58 = 局部空间是否带池化抓不到的信号。
data:
  tensor_cache_root: asset_quality_scorer/cache/224
  clip_feature_path: asset_quality_scorer/features/clip_vitl14_openai_render_base_color.pt
  csv_path: asset_quality_scorer/dataset/sampled_all.csv
model:
  clip_dim: 1536
  attn_proj_dim: 256
  attn_heads: 4
  hidden_dim: 512
  dropout: 0.3
  invalid_max_score: 1
  metallic_film: false
  metallic_grad_scale: 0.5
  emd_channels: all
  metallic_spatial_xchannel: true    # ← 唯一新增: metallic读其他通道空间token
  msx_heads: 8
train:
  epochs: 30
  batch_size: 12
  num_workers: 8
  lr: 0.0001
  weight_decay: 0.0001
  binary_loss_weight: 0.2
  ranking_loss_weight: 0.05
  huber_delta: 1.0
  channel_weights: {base_color: 1.0, normal_map: 1.0, roughness: 1.0, metallic: 1.5}
unfreeze: {stage4_epoch: 5, stage34_epoch: 10, stage234_epoch: 15}
output: {root: asset_quality_scorer/outputs/runs, exp_suffix: emd_me_spatialx}
