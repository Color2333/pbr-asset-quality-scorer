# 近黑信号增亮小实验: metallic 输入对比拉伸 x1。冻结骨干(只训头, 快/省显存,
# 可与 VLM 全量训练共存于同卡余量)。stretch1=基线对照, stretch8=实验组, 仅此一项不同。
data:
  tensor_cache_root: asset_quality_scorer/cache/224
  clip_feature_path: asset_quality_scorer/features/clip_vitl14_openai_render_base_color.pt
  csv_path: asset_quality_scorer/dataset/sampled_all.csv
  metallic_stretch: 1.0

model:
  clip_dim: 1536
  attn_proj_dim: 256
  attn_heads: 4
  hidden_dim: 512
  dropout: 0.3
  invalid_max_score: 1
  metallic_film: false
  metallic_grad_scale: 0.5
  emd_channels: all

train:
  epochs: 20
  batch_size: 10
  num_workers: 8
  lr: 0.0001
  weight_decay: 0.0001
  binary_loss_weight: 0.2
  ranking_loss_weight: 0.05
  huber_delta: 1.0
  channel_weights:
    base_color: 1.0
    normal_map: 1.0
    roughness:  1.0
    metallic:   1.5

unfreeze:
  stage4_epoch: 999
  stage34_epoch: 999
  stage234_epoch: 999   # 永不解冻 = 骨干全程冻结

output:
  root: asset_quality_scorer/outputs/runs
  exp_suffix: stretch1
