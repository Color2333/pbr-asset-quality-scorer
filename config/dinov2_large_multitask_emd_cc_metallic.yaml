# "metallic读其他通道"实验: EMD基线 + 非对称CrossChannelBlock(metallic读bc/nm/ro, 硬mask挡反向, cc_metallic_only=其他通道严格不变)。干净隔离测"metallic据其他通道内容判断"。
# 头: 预测 0-5 的 6-bin 概率分布; 损失: squared EMD (累积分布差)。
# 动机(小实验验证): EMD 既保留序数性(SRCC 不输回归)又用分布建模拿到分类级 acc,
#   且 EMD 天然"差一档轻罚、差多档重罚"——是"5→4 可接受"的原则性版本。
#   小实验显示 acc 全面 +0.03~0.08, SRCC 不降。取分: 期望Σ(p·k)→SRCC, argmax→acc。
data:
  tensor_cache_root: asset_quality_scorer/cache/224
  clip_feature_path: asset_quality_scorer/features/clip_vitl14_openai_render_base_color.pt
  csv_path: asset_quality_scorer/dataset/sampled_all.csv

model:
  clip_dim: 1536
  attn_proj_dim: 256
  attn_heads: 4
  hidden_dim: 512
  dropout: 0.3
  invalid_max_score: 1
  metallic_film: false
  metallic_grad_scale: 0.5
  emd_channels: all           # ← 唯一改动: 全 4 通道用 NIMA/EMD 分布头
  use_cross_channel: true     # 开启CrossChannelBlock
  cc_metallic_only: true      # 只更新metallic, bc/nm/ro严格不变
  cc_me_bc_bias: 1.0
  cc_me_ro_bias: 1.0

train:
  epochs: 30
  batch_size: 12
  num_workers: 8
  lr: 0.0001
  weight_decay: 0.0001
  binary_loss_weight: 0.2
  ranking_loss_weight: 0.05
  huber_delta: 1.0
  channel_weights:
    base_color: 1.0
    normal_map: 1.0
    roughness:  1.0
    metallic:   1.5

unfreeze:
  stage4_epoch: 5
  stage34_epoch: 10
  stage234_epoch: 15

output:
  root: asset_quality_scorer/outputs/runs
  exp_suffix: emd_cc_metallic
